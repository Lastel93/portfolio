<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stef. | portfolio</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* =====================================================
           1. VARIABILI GLOBALI & RESET
        ===================================================== */
        :root {
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --bg-page: #0b0f19;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --gradient-banner: linear-gradient(90deg, #8cb5ff 0%, #bca5ff 50%, #f196ff 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-page);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* =====================================================
           2. HEADER STILE SOCIAL
        ===================================================== */
        .profile-header {
            background: var(--gradient-banner);
            padding: 80px 20px;
            position: relative;
        }

        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 50px;
        }

        .profile-avatar-wrapper {
            position: relative;
            padding: 5px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0; 
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: #1e293b;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h1 {
            font-size: 4rem;
            font-weight: 800;
            color: #0b0f19;
            letter-spacing: -2px;
            line-height: 1;
        }

        .profile-info p {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0b0f19;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* =====================================================
           3. STORIES / HIGHLIGHTS DI NAVIGAZIONE
        ===================================================== */
        .highlights-section {
            background: #111827;
            padding: 30px 20px;
            border-bottom: 1px solid #1f2937;
        }

        .highlights-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 35px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .highlights-container::-webkit-scrollbar { display: none; }

        .story-circle-wrapper {
            text-decoration: none;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .story-circle-wrapper:hover { transform: scale(1.05); }

        .story-ring {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: var(--gradient-banner);
            padding: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .story-content {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .story-label {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* =====================================================
           4. SEZIONE COMPLETA: COOL PROJECTS (FEED UNIFICATO)
        ===================================================== */
        .feed-container {
            width: 100%;
        }

        .feed-section-title {
            max-width: 1400px;
            margin: 60px auto 20px auto;
            padding: 0 40px;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            border-left: 5px solid #bca5ff;
        }

        .social-post {
            width: 100%;
            display: flex;
            align-items: center;
            min-height: 80vh;
            position: relative;
            border-bottom: 1px solid #1f2937;
        }

        .social-post:nth-child(even) {
            flex-direction: row-reverse;
        }

        .post-media-side {
            width: 50%;
            height: 80vh;
            overflow: hidden;
            position: relative;
        }

        .post-media-side img, .post-media-side video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease-out;
        }

        .social-post:hover .post-media-side img {
            transform: scale(1.03);
        }

        .post-text-side {
            width: 50%;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .post-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gradient-banner);
            padding: 2px;
        }
        .post-avatar-inner {
            width: 100%;
            height: 100%; 
            background: #000; 
            border-radius: 50%;
        }

        .post-author { font-weight: 700; font-size: 1.1rem; }
        .post-date { color: var(--text-muted); font-size: 0.9rem; }

        .post-title {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .post-caption {
            font-size: 1.15rem;
            color: #cbd5e1;
            line-height: 1.7;
            margin-bottom: 25px;
        }

        .post-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .hashtag {
            color: #8cb5ff;
            font-weight: 600;
            text-decoration: none;
            font-size: 1rem;
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* =====================================================
           5. SEZIONE TRAVEL MAP (PULITA SENZA CONTATORI)
        ===================================================== */
        .travel-section {
            background: #0b0f19;
            padding: 60px 0 100px 0;
        }

        .travel-header {
            max-width: 1400px;
            margin: 0 auto 40px auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
        }

        .travel-header-left {
            text-align: left;
        }

        .travel-header-left h2 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            border-left: 5px solid #bca5ff;
            padding-left: 20px;
            margin-bottom: 8px;
        }

        .travel-header-left p {
            padding-left: 20px;
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 500;
        }

        .travel-map-wrapper {
